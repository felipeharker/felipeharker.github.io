name: Site checks

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  jekyll-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Jekyll
        run: |
          gem install jekyll -v 4.3.4

      - name: Build site
        run: jekyll build
