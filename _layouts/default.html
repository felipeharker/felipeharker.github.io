<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/styles/styles-main.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/siimple-icons/siimple-icons.css">
</head>
<body>
  {% include nav.html %}

  <header>
    <h1>
      {{ page.heading | default: page.title | default: site.title }}
      {% if page.badge %}
        <i class="i-grey">{{ page.badge }}</i>
      {% endif %}
    </h1>
  </header>

  <main>
    {{ content }}
  </main>
</body>
</html>
